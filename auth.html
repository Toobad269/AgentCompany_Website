<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCompany — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070d;--bg1:#0d0d18;--bg2:#141426;--bg3:#1c1c32;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --purple:#8b5cf6;--purple-l:#a78bfa;--purple-d:rgba(139,92,246,0.12);
  --purple-g:linear-gradient(135deg,#8b5cf6 0%,#a78bfa 100%);
  --green:#4ade80;--red:#f87171;
  --text:#e6e3f5;--dim:#9290b0;--muted:#58567a;
  --mono:'JetBrains Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(139,92,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.04) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:700px;height:500px;background:radial-gradient(ellipse,rgba(139,92,246,0.1) 0%,transparent 70%);
  pointer-events:none;z-index:0}
.auth-logo{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;
  padding:0 2rem;background:rgba(7,7,13,0.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);z-index:10}
.logo{font-family:var(--cond);font-weight:700;font-size:18px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text);display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{background:var(--purple-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-size:24px}
.card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--bg1);
  border:1px solid var(--border2);border-radius:14px;padding:2.5rem;margin-top:1rem}
.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:2rem}
.tab{flex:1;font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;
  padding:0.55rem;text-align:center;border-radius:5px;cursor:pointer;color:var(--dim);
  border:none;background:none;transition:all .15s}
.tab.active{background:var(--purple-g);color:#fff}
.form{display:flex;flex-direction:column;gap:1.1rem}
.form-group{display:flex;flex-direction:column;gap:0.4rem}
.form-label{font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim)}
.form-input{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:0.75rem 1rem;
  font-family:var(--sans);font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.form-input:focus{border-color:rgba(139,92,246,0.5);box-shadow:0 0 0 3px rgba(139,92,246,0.1)}
.form-input::placeholder{color:var(--muted)}
.form-error{font-family:var(--mono);font-size:11px;color:var(--red);margin-top:4px;padding:6px 10px;
  background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:5px;display:none}
.btn-submit{font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:0.07em;text-transform:uppercase;
  background:var(--purple-g);color:#fff;border:none;padding:0.9rem;border-radius:7px;
  cursor:pointer;width:100%;margin-top:0.5rem;transition:filter .15s,transform .15s}
.btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.form-footer{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:1rem;line-height:1.6}
.form-footer a{color:var(--purple-l);text-decoration:none}
.success-msg{display:none;text-align:center;padding:1rem 0}
.success-icon{font-size:3rem;margin-bottom:1rem;display:block}
.success-title{font-family:var(--cond);font-weight:700;font-size:1.4rem;text-transform:uppercase;
  letter-spacing:0.04em;margin-bottom:0.5rem;color:var(--green)}
.success-sub{color:var(--dim);font-size:0.875rem;font-weight:300;line-height:1.6}
</style>
</head>
<body>
<div class="auth-logo">
  <a href="index.html" class="logo"><span class="logo-mark">◈</span> AgentCompany</a>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="text" id="login-email" placeholder="you@example.com"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pw" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')doLogin()">
        <div class="form-error" id="login-err"></div>
      </div>
      <button class="btn-submit" type="button" id="login-btn" onclick="doLogin()">Login to Dashboard</button>
    </div>
    <div class="form-footer">
      No account yet? <a href="#" onclick="switchTab('register');return false;">Create one for free</a>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="form-register" style="display:none">
    <div class="form">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Colin Berier">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="text" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-pw" placeholder="At least 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input class="form-input" type="password" id="reg-pw2" placeholder="Repeat password"
          onkeydown="if(event.key==='Enter')doRegister()">
        <div class="form-error" id="reg-err"></div>
      </div>
      <button class="btn-submit" type="button" id="reg-btn" onclick="doRegister()">Create account</button>
    </div>
    <div class="form-footer">
      Already have an account? <a href="#" onclick="switchTab('login');return false;">Login</a><br><br>
      By signing up you agree to our <a href="#">Terms of Service</a>.
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="success-msg" id="success-msg">
    <span class="success-icon">✅</span>
    <div class="success-title">You're in!</div>
    <p class="success-sub">Account created. Redirecting to your dashboard…</p>
  </div>
</div>

<script>
const USERS_KEY = 'ac_users';
const SESSION_KEY = 'ac_session';

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch { return []; }
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display = tab==='login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? '' : 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr(id) {
  document.getElementById(id).style.display = 'none';
}

function doLogin() {
  hideErr('login-err');
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw    = document.getElementById('login-pw').value;

  if (!email) { showErr('login-err', 'Please enter your email.'); return; }
  if (!pw)    { showErr('login-err', 'Please enter your password.'); return; }

  const users = getUsers();
  const user  = users.find(u => u.email === email && u.pw === btoa(pw));

  if (!user) {
    showErr('login-err', 'Wrong email or password. No account yet? Switch to Register.');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  localStorage.setItem(SESSION_KEY, JSON.stringify({ email: user.email, name: user.name, ts: Date.now() }));
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
}

function doRegister() {
  hideErr('reg-err');
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const pw    = document.getElementById('reg-pw').value;
  const pw2   = document.getElementById('reg-pw2').value;

  if (!name)        { showErr('reg-err', 'Please enter your name.'); return; }
  if (!email)       { showErr('reg-err', 'Please enter your email.'); return; }
  if (pw.length < 8){ showErr('reg-err', 'Password must be at least 8 characters.'); return; }
  if (pw !== pw2)   { showErr('reg-err', 'Passwords do not match.'); return; }

  const users = getUsers();
  if (users.find(u => u.email === email)) {
    showErr('reg-err', 'This email is already registered. Please login instead.');
    return;
  }

  users.push({ name, email, pw: btoa(pw), created: Date.now() });
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  localStorage.setItem(SESSION_KEY, JSON.stringify({ email, name, ts: Date.now() }));

  document.getElementById('reg-btn').disabled = true;
  document.getElementById('form-register').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
}

// Already logged in? Go straight to dashboard
if (localStorage.getItem(SESSION_KEY)) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
